# Docker Compose for Monitoring Stack
# BSU Engineering Portal - Prometheus + Grafana + Exporters
# Usage: docker compose -f docker-compose-monitoring.yml --env-file .env.monitoring up -d

services:
  # Prometheus - Metrics collection and storage
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: bsu_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring
      - bsu_network

  # Grafana - Visualization dashboards
  grafana:
    image: grafana/grafana:10.2.3
    container_name: bsu_grafana
    restart: unless-stopped
    env_file:
      - .env.monitoring
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus

  # Node Exporter - System metrics (CPU, memory, disk)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: bsu_node_exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro
    ports:
      - "9100:9100"
    networks:
      - monitoring

  # MySQL Exporter - Database metrics
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.0
    container_name: bsu_mysql_exporter
    restart: unless-stopped
    volumes:
      - ./monitoring/mysql-exporter/.my.cnf:/.my.cnf:ro
    command:
      - '--config.my-cnf=/.my.cnf'
      - '--collect.info_schema.tables'
      - '--collect.info_schema.innodb_metrics'
      - '--collect.global_status'
      - '--collect.global_variables'
    ports:
      - "9104:9104"
    networks:
      - monitoring
      - bsu_network

  # Redis Exporter - Cache metrics
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: bsu_redis_exporter
    restart: unless-stopped
    env_file:
      - .env.monitoring
    ports:
      - "9121:9121"
    networks:
      - monitoring
      - bsu_network

  # Nginx Log Exporter - Web server metrics
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: bsu_nginx_exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://nginx:80/stub_status'
    ports:
      - "9113:9113"
    networks:
      - monitoring
      - bsu_network

  # cAdvisor - Container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: bsu_cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - monitoring

  # Alertmanager - Alert routing (Email + Slack)
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: bsu_alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
  bsu_network:
    external: true
    name: bsu_engineering_portal_graduation_project_bsu_network

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

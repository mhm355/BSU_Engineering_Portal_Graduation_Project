# Alertmanager Configuration
# BSU Engineering Portal - Email + Slack Notifications
# Values are hardcoded here (envsubst is not available in the Alertmanager image)

global:
  # SMTP settings for email alerts
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@bsu-engineering.edu'
  smtp_auth_username: [EMAIL_ADDRESS]'
  smtp_auth_password: [PASSWORD]
  smtp_require_tls: true

# Templates for alert formatting
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route alerts to appropriate receivers
route:
  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'instance']
  # Wait 30s before sending to group alerts
  group_wait: 30s
  # Send grouped alerts every 5m
  group_interval: 5m
  # Wait before resending
  repeat_interval: 12h
  # Default receiver
  receiver: 'default'
  # Routes for specific severities
  routes:
    # Critical alerts go to both email and Slack
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    # Warning alerts go to Slack only
    - match:
        severity: warning
      receiver: 'slack-only'

# Receivers define where alerts are sent
receivers:
  # Default: Slack notifications
  - name: 'default'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#bsu-alerts'
        title: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  # Critical alerts: Email + Slack
  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@bsu-engineering.edu'
        headers:
          Subject: '[CRITICAL] BSU Portal Alert: {{ .GroupLabels.alertname }}'
        html: |
          {{ range .Alerts }}
          <p><b>Alert:</b> {{ .Annotations.summary }}</p>
          <p><b>Severity:</b> {{ .Labels.severity }}</p>
          <p><b>Instance:</b> {{ .Labels.instance }}</p>
          <p><b>Description:</b> {{ .Annotations.description }}</p>
          <p><b>Time:</b> {{ .StartsAt }}</p>
          <hr>
          {{ end }}
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#bsu-alerts-critical'
        title: ':rotating_light: CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  # Warning alerts: Slack only
  - name: 'slack-only'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#bsu-alerts'
        title: ':warning: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

# Inhibition rules - suppress certain alerts
inhibit_rules:
  # If a critical alert is firing, suppress warnings for same instance
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['instance']

# Alertmanager Configuration
# BSU Engineering Portal - Email + Slack Notifications
# Note: Replace placeholders with actual values before deployment

global:
  # SMTP settings for email alerts (loaded from .env.monitoring)
  smtp_smarthost: '${ALERTMANAGER_SMTP_SMARTHOST:-smtp.gmail.com:587}'
  smtp_from: '${ALERTMANAGER_SMTP_FROM:-alerts@bsu-engineering.edu}'
  smtp_auth_username: '${ALERTMANAGER_SMTP_AUTH_USERNAME}'
  smtp_auth_password: '${ALERTMANAGER_SMTP_AUTH_PASSWORD}'
  smtp_require_tls: ${ALERTMANAGER_SMTP_REQUIRE_TLS:-true}

# Templates for alert formatting
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route alerts to appropriate receivers
route:
  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'instance']
  # Wait 30s before sending to group alerts
  group_wait: 30s
  # Send grouped alerts every 5m
  group_interval: 5m
  # Wait before resending
  repeat_interval: 12h
  # Default receiver
  receiver: 'default'
  # Routes for specific severities
  routes:
    # Critical alerts go to both email and Slack
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    # Warning alerts go to Slack only
    - match:
        severity: warning
      receiver: 'slack-only'

# Receivers define where alerts are sent
receivers:
  # Default: Slack notifications
  - name: 'default'
    slack_configs:
      - api_url: '${ALERTMANAGER_SLACK_API_URL}'
        channel: '${ALERTMANAGER_SLACK_CHANNEL:-#bsu-alerts}'
        title: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  # Critical alerts: Email + Slack
  - name: 'critical-alerts'
    email_configs:
      - to: '${ALERTMANAGER_EMAIL_TO:-admin@bsu-engineering.edu}'
        subject: '[CRITICAL] BSU Portal Alert: {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Severity: {{ .Labels.severity }}
          Instance: {{ .Labels.instance }}
          Description: {{ .Annotations.description }}
          Time: {{ .StartsAt }}
          
          ---
          {{ end }}
        send_resolved: true
    slack_configs:
      - api_url: '${ALERTMANAGER_SLACK_API_URL}'
        channel: '${ALERTMANAGER_SLACK_CHANNEL_CRITICAL:-#bsu-critical}'
        title: ':rotating_light: CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  # Warning alerts: Slack only
  - name: 'slack-only'
    slack_configs:
      - api_url: '${ALERTMANAGER_SLACK_API_URL}'
        channel: '${ALERTMANAGER_SLACK_CHANNEL:-#bsu-alerts}'
        title: ':warning: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

# Inhibition rules - suppress certain alerts
inhibit_rules:
  # If a critical alert is firing, suppress warnings for same instance
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['instance']

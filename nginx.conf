# ==========================================
# GLOBAL HTTP CONTEXT: Rate Limiting Zones
# ==========================================
# We define memory zones to track client IP addresses for rate limiting.
# $binary_remote_addr: Compresses the client's IP to save server RAM.
# zone=api_limit:10m: Names the zone 'api_limit' and allocates 10 Megabytes of memory (~160,000 IPs).
# rate=10r/s: The strict baseline rate. The 'bucket' leaks at exactly 10 requests per second.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# A much stricter zone specifically for the Django Admin panel to prevent brute-force login attacks.
# rate=2r/s: Allows only 2 requests per second per IP.
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=2r/s;

server {
    # ==========================================
    # SERVER SETUP
    # ==========================================
    # Listen for standard HTTP traffic on port 80. (TLS/SSL is likely handled at the Azure edge level).
    listen 80; 
    
    # 'localhost' is the default server name since Nginx is running inside a Docker container.
    server_name localhost; 
    
    # Allows users to upload files up to 50 Megabytes (critical for student assignments and batch Excel uploads).
    client_max_body_size 50M; 

    # ==========================================
    # SECURITY HEADERS
    # ==========================================
    # Prevents browsers from guessing the file type, stopping MIME-sniffing vulnerabilities.
    add_header X-Content-Type-Options "nosniff" always; 
    
    # Prevents clickjacking by stopping malicious sites from embedding your portal inside an <iframe>.
    add_header X-Frame-Options "SAMEORIGIN" always; 
    
    # Forces the browser's basic Cross-Site Scripting (XSS) filter to block detected attack scripts.
    add_header X-XSS-Protection "1; mode=block" always; 
    
    # Controls how much referrer information is sent when clicking away from your site.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always; 

    # ==========================================
    # FRONTEND (REACT SPA) ROUTING
    # ==========================================
    # Defines the root directory where the compiled React build files live inside the container.
    root /usr/share/nginx/html; 
    
    # Defines the default file to serve when a user visits the root domain.
    index index.html; 

    location / {
        # try_files acts as a fallback mechanism for Single Page Applications (SPAs).
        # 1. $uri: Check if the exact requested file exists (like a specific logo.png).
        # 2. $uri/: Check if it's a directory.
        # 3. /index.html: If neither exist, route everything back to React's index.html so the React Router can take over.
        try_files $uri $uri/ /index.html; 
    }

    # ==========================================
    # BACKEND (DJANGO REST API) ROUTING
    # ==========================================
    location /api/ {
        # Applies the 'api_limit' rate limit zone defined at the top of the file.
        # burst=20: Allows a sudden spike of 20 requests to queue up before rejecting them.
        # nodelay: Processes those burst requests instantly instead of artificially delaying them.
        limit_req zone=api_limit burst=20 nodelay; 
        
        # Changes the default 503 Server Error to a standard 429 "Too Many Requests" when the limit is hit.
        limit_req_status 429; 

        # Forwards the traffic to the Django backend container on internal port 8000.
        proxy_pass http://backend:8000; 
        
        # Passes the original domain name requested by the user.
        proxy_set_header Host $host; 
        
        # Passes the real IP address of the user (otherwise Django logs will show Nginx's internal IP for everything).
        proxy_set_header X-Real-IP $remote_addr; 
        
        # Maintains a chain of all proxy IP addresses the request passed through.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        
        # Tells Django whether the original edge request was HTTP or HTTPS.
        proxy_set_header X-Forwarded-Proto $scheme; 
        
        # Timeout settings: Gives the Django backend up to 300 seconds to process heavy tasks (like parsing a massive Excel sheet) before Nginx drops the connection.
        proxy_read_timeout 300s; 
        proxy_connect_timeout 75s; 
        proxy_send_timeout 300s; 
    }

    # ==========================================
    # ADMIN PANEL ROUTING
    # ==========================================
    location /admin/ {
        # Applies the highly restrictive 'admin_limit' zone.
        # burst=5: Only allows a tiny burst, immediately shutting down automated password-guessing bots.
        limit_req zone=admin_limit burst=5 nodelay; 
        limit_req_status 429;

        # Standard proxy headers (same as /api/)
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # DJANGO STATIC FILES
    # ==========================================
    location /static/ {
        # Notice: NO rate limiting here! Browsers request many CSS/JS files simultaneously. Limiting this breaks the UI.
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # MEDIA FILES
    # ==========================================
    location /media/ {
        # Points Nginx directly to the local folder containing user-uploaded files (fallback for local storage).
        alias /usr/share/nginx/html/media/; 
        
        # Tells the user's browser to cache these media files for 30 days to save server bandwidth.
        expires 30d; 
        
        # Forces public caching and prevents intermediary network proxies from altering the file contents.
        add_header Cache-Control "public, no-transform"; 
    }
}
